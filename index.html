<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1a1a1a" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>買い物メモ</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 16px;
            background: #f2f2f7; color: #000;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #1a1a1a; color: #e0e0e0; }
        }
        h1 { margin: 0 0 16px; font-size: 22px; text-align: center; }

        /* ── Category ── */
        .cat-section { margin-bottom: 8px; }

        .cat-header {
            display: flex; align-items: center; gap: 6px;
            padding: 10px 8px 6px;
            cursor: pointer; user-select: none; -webkit-user-select: none;
        }
        .cat-arrow { font-size: 10px; color: #888; width: 14px; flex-shrink: 0; }
        .cat-name  {
            font-size: 12px; font-weight: 700; color: #666;
            letter-spacing: 0.8px; text-transform: uppercase; flex: 1;
        }
        .cat-name-input {
            flex: 1; border: none; border-bottom: 2px solid #007AFF;
            outline: none; font-size: 12px; font-weight: 700;
            background: transparent; padding: 0; font-family: inherit;
            color: inherit; letter-spacing: 0.8px;
        }
        @media (prefers-color-scheme: dark) {
            .cat-name { color: #888; }
        }

        .cat-body {
            padding: 4px 0; gap: 0; display: flex;
            flex-direction: column;
        }

        /* ── Panel ── */
        .panel {
            position: relative; background: #fff; border: none;
            padding: 8px 8px 8px 0; display: flex; align-items: center; gap: 6px;
            min-height: 40px; will-change: transform;
            user-select: none; -webkit-user-select: none; touch-action: manipulation;
            overflow: hidden; border-bottom: 1px solid #eee;
            z-index: 2;
        }
        @media (prefers-color-scheme: dark) {
            .panel { background: #1a1a1a; border-bottom-color: #333; }
        }
        .panel.needed {
            background: #f0faf0;
        }
        @media (prefers-color-scheme: dark) {
            .panel.needed { background: #1a2e1a; }
        }
        .panel.drag-source { opacity: 0; pointer-events: none; }
        .panel.panel-dummy {
            background: transparent; border: none; border-bottom: 1.5px dashed #ccc;
            justify-content: center; color: #bbb; font-size: 13px;
            min-height: 36px; cursor: pointer;
        }
        @media (prefers-color-scheme: dark) {
            .panel.panel-dummy { border-bottom-color: #444; color: #555; }
        }
        .panel.panel-edit {
            background: #f5f5f5; border: none; border-bottom: 2px solid #007AFF; cursor: default;
        }
        @media (prefers-color-scheme: dark) {
            .panel.panel-edit { background: #2a2a2a; }
        }

        /* Swipe delete button */
        .swipe-del-btn {
            position: absolute; right: 0; top: 0; bottom: 0;
            width: 80px; background: #ff4444; color: #fff;
            border: none; font-size: 18px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; z-index: 0; padding: 0;
            pointer-events: none;
        }
        .panel.swipe-reveal .swipe-del-btn {
            pointer-events: auto;
        }

        /* ── Photo frame ── */
        .photo {
            width: 32px; min-width: 32px; height: 32px;
            border-radius: 4px; border: 1px solid #ddd;
            background: #ebebeb; flex-shrink: 0; overflow: hidden;
        }
        @media (prefers-color-scheme: dark) { .photo { background: #3a3a3a; border-color: #555; } }

        /* ── Name ── */
        .item-name {
            flex: 1; font-size: 14px; font-weight: 500;
            line-height: 1.3; word-break: break-word; cursor: pointer;
        }
        .item-name-input {
            flex: 1; border: none; outline: none;
            font-size: 14px; font-weight: 500;
            background: transparent; padding: 0;
            font-family: inherit; color: inherit;
        }

        /* ── Toggle ── */
        .toggle {
            width: 50px; min-width: 50px; height: 30px;
            background: #ccc; border-radius: 15px; border: none;
            cursor: pointer; display: flex; align-items: center;
            padding: 2px; transition: background .2s; flex-shrink: 0;
        }
        .toggle.on { background: #4caf50; }
        .toggle-knob {
            width: 26px; height: 26px; background: #fff;
            border-radius: 50%; transition: transform .2s; pointer-events: none;
        }
        .toggle.on .toggle-knob { transform: translateX(20px); }

        /* ── Drag handle ── */
        .drag-handle {
            font-size: 20px; color: #ccc; min-width: 40px;
            padding: 6px 8px; text-align: center;
            touch-action: none; flex-shrink: 0;
        }
        @media (prefers-color-scheme: dark) { .drag-handle { color: #555; } }

        /* ── Delete button (edit mode only) ── */
        .btn-del {
            width: 32px; height: 32px; border-radius: 8px;
            background: #ffebee; color: #e53935; border: none;
            font-size: 17px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        @media (prefers-color-scheme: dark) { .btn-del { background: #3a1515; color: #ef9a9a; } }

        /* ── Add category dummy ── */
        .add-cat {
            margin-top: 12px; padding: 10px;
            border: 1.5px dashed #ccc; border-radius: 8px;
            text-align: center; color: #bbb; font-size: 13px; cursor: pointer;
        }
        .add-cat-edit {
            margin-top: 12px; padding: 10px 12px;
            border: 2px solid #007AFF; border-radius: 8px; background: #fff;
        }
        @media (prefers-color-scheme: dark) {
            .add-cat { border-color: #444; color: #555; }
            .add-cat-edit { background: #2a2a2a; }
        }
        .add-cat-input {
            width: 100%; border: none; outline: none;
            font-size: 14px; background: transparent;
            font-family: inherit; color: inherit;
        }
    </style>
</head>
<body>
    <h1>買い物メモ</h1>
    <div id="app"></div>

    <script>
    const AppState = {
        categories: [],
        items: [],

        init(presetCats, presetItems) {
            const c = Storage.load('categories2');
            const i = Storage.load('items2');
            if (!c) {
                this.categories = JSON.parse(JSON.stringify(presetCats));
                this.items      = JSON.parse(JSON.stringify(presetItems));
            } else {
                this.categories = c;
                this.items      = i || [];
            }
            this.save();
        },

        getCategories()          { return this.categories; },
        getItems()               { return this.items; },
        getItemsByCat(catId)     { return this.items.filter(i => i.categoryId === catId); },

        toggleCat(catId) {
            const c = this.categories.find(c => c.id === catId);
            if (c) { c.collapsed = !c.collapsed; this.save(); }
        },
        addCategory(name) {
            this.categories.push({ id: 't' + Date.now(), name, collapsed: false });
            this.save();
        },
        updateCatName(catId, name) {
            const c = this.categories.find(c => c.id === catId);
            if (c) { c.name = name; this.save(); }
        },

        addItem(name, categoryId) {
            this.items.push({ id: Date.now(), name, categoryId, needed: false });
            this.save();
        },
        updateItemName(id, name) {
            const i = this.items.find(i => i.id === id);
            if (i) { i.name = name; this.save(); }
        },
        toggleNeeded(id) {
            const i = this.items.find(i => i.id === id);
            if (i) { i.needed = !i.needed; this.save(); }
        },
        deleteItem(id) {
            this.items = this.items.filter(i => i.id !== id);
            this.save();
        },

        reorderInCat(categoryId, newOrderIds) {
            const reordered = newOrderIds.map(id => this.items.find(i => i.id === id)).filter(Boolean);
            const result = [];
            let placed = false;
            for (const item of this.items) {
                if (item.categoryId === categoryId) {
                    if (!placed) { result.push(...reordered); placed = true; }
                } else {
                    result.push(item);
                }
            }
            if (!placed) result.push(...reordered);
            this.items = result;
            this.save();
        },

        save() {
            Storage.save('categories2', this.categories);
            Storage.save('items2',      this.items);
        },
    };

    const UI = {
        editId: null,
        _outsideOff: null,

        render() {
            const cats  = AppState.getCategories();
            const items = AppState.getItems();
            let html = cats.map(c => this._cat(c, items.filter(i => i.categoryId === c.id))).join('');
            html += this._addCatBlock();
            document.getElementById('app').innerHTML = html;

            if (this.editId !== null) {
                const el = document.getElementById('ii');
                if (el) { el.focus(); if (el.select) el.select(); }
            }
        },

        _cat(cat, catItems) {
            const editingName = this.editId === `cat-${cat.id}`;
            const nameEl = editingName
                ? `<input id="ii" class="cat-name-input"
                          value="${esc(cat.name)}"
                          onkeydown="EH.key(event)"
                          onclick="event.stopPropagation()">`
                : `<span class="cat-name"
                         onclick="event.stopPropagation();UI.enter('cat-${cat.id}')"
                         >${escH(cat.name)}</span>`;

            return `<div class="cat-section" data-cat="${cat.id}">
                <div class="cat-header" onclick="EH.toggleCat('${cat.id}')">
                    <span class="cat-arrow">${cat.collapsed ? '▶' : '▼'}</span>
                    ${nameEl}
                </div>
                ${cat.collapsed ? '' : `
                <div class="cat-body" data-cat="${cat.id}">
                    ${catItems.map(i => this._panel(i)).join('')}
                    ${this._addItemDummy(cat.id)}
                </div>`}
            </div>`;
        },

        _panel(item) {
            if (this.editId === `item-${item.id}`) {
                return `<div class="panel panel-edit" data-id="${item.id}">
                    <div class="photo"></div>
                    <input id="ii" class="item-name-input"
                           value="${esc(item.name)}"
                           onkeydown="EH.key(event)"
                           onclick="event.stopPropagation()">
                    <button class="btn-del"
                            onclick="event.stopPropagation();EH.del(${item.id})">🗑</button>
                </div>`;
            }
            return `<div class="panel ${item.needed ? 'needed' : ''}" data-id="${item.id}"
                         onclick="UI.enter('item-${item.id}')">
                <div class="photo"></div>
                <span class="item-name">${escH(item.name)}</span>
                <button class="toggle ${item.needed ? 'on' : ''}"
                        onclick="event.stopPropagation();EH.toggle(${item.id})">
                    <div class="toggle-knob"></div>
                </button>
                <div class="drag-handle" onclick="event.stopPropagation()">⠿</div>
                <button class="swipe-del-btn"
                        onclick="event.stopPropagation();EH.del(${item.id})">🗑</button>
            </div>`;
        },

        _addItemDummy(catId) {
            if (this.editId === `new-${catId}`) {
                return `<div class="panel panel-edit" data-new-cat="${catId}">
                    <div class="photo"></div>
                    <input id="ii" class="item-name-input"
                           placeholder="アイテム名..."
                           onkeydown="EH.key(event)"
                           onclick="event.stopPropagation()">
                </div>`;
            }
            return `<div class="panel panel-dummy" onclick="UI.enter('new-${catId}')">＋ 追加</div>`;
        },

        _addCatBlock() {
            if (this.editId === 'newcat') {
                return `<div class="add-cat-edit">
                    <input id="ii" class="add-cat-input"
                           placeholder="カテゴリ名..."
                           onkeydown="EH.key(event)"
                           onclick="event.stopPropagation()">
                </div>`;
            }
            return `<div class="add-cat" onclick="UI.enter('newcat')">＋ カテゴリ追加</div>`;
        },

        enter(id) {
            if (this.editId === id) return;
            if (this.editId !== null) this._save();
            this.editId = id;
            this.render();

            if (this._outsideOff) this._outsideOff();
            const handler = (e) => {
                const input = document.getElementById('ii');
                if (!input) return;
                const wrap = input.closest('.panel-edit, .add-cat-edit, .cat-header');
                if (wrap && wrap.contains(e.target)) return;
                this.exit(true);
            };
            setTimeout(() => {
                document.addEventListener('mousedown',  handler);
                document.addEventListener('touchstart', handler);
                this._outsideOff = () => {
                    document.removeEventListener('mousedown',  handler);
                    document.removeEventListener('touchstart', handler);
                };
            }, 10);
        },

        exit(save) {
            if (this._outsideOff) { this._outsideOff(); this._outsideOff = null; }
            if (save) this._save();
            this.editId = null;
            this.render();
        },

        _save() {
            const input = document.getElementById('ii');
            if (!input) return;
            const val = input.value.trim();
            if (!val) return;
            const id = this.editId;
            if (id === 'newcat')          AppState.addCategory(val);
            else if (id.startsWith('new-'))  AppState.addItem(val, id.slice(4));
            else if (id.startsWith('cat-'))  AppState.updateCatName(id.slice(4), val);
            else if (id.startsWith('item-')) AppState.updateItemName(+id.slice(5), val);
        },
    };

    const EH = {
        toggleCat(catId) { AppState.toggleCat(catId); UI.render(); },
        toggle(id)       { AppState.toggleNeeded(id); UI.render(); },
        del(id) {
            UI.exit(false);
            AppState.deleteItem(id);
            UI.render();
        },
        key(e) {
            if (e.key === 'Enter')  { e.preventDefault(); UI.exit(true); }
            if (e.key === 'Escape') { UI.exit(false); }
        },
    };

    const Swipe = {
        s: { panel: null, startX: 0, offsetX: 0, moved: false },
        _mv: null, _up: null,

        init() {
            document.addEventListener('touchstart', e => this._ts(e), { passive: true });
        },

        _ts(e) {
            if (e.touches.length > 1) return;
            const panel = e.target.closest('.panel:not(.panel-dummy):not(.panel-edit)');
            if (!panel || UI.editId) return;
            const h = e.target.closest('.drag-handle');
            if (h) return;
            this.s.panel = panel;
            this.s.startX = e.touches[0].clientX;
            this.s.offsetX = 0;
            this.s.moved = false;

            this._mv = e => { e.preventDefault(); this._move(e.touches[0]); };
            this._up = () => this._end();
            document.addEventListener('touchmove', this._mv, { passive: false });
            document.addEventListener('touchend', this._up, { passive: true });
        },

        _move(t) {
            const dx = t.clientX - this.s.startX;
            if (dx > -10 && dx < 10) return;
            this.s.moved = true;
            this.s.offsetX = Math.max(-80, Math.min(dx, 0));
            this.s.panel.style.transform = `translateX(${this.s.offsetX}px)`;
        },

        _end() {
            document.removeEventListener('touchmove', this._mv);
            document.removeEventListener('touchend', this._up);
            if (!this.s.moved || !this.s.panel) return;
            if (this.s.offsetX < -50) {
                this.s.panel.style.transition = 'transform .2s';
                this.s.panel.style.transform = 'translateX(-80px)';
                setTimeout(() => this._deleteAfterSwipe(), 200);
            } else {
                this.s.panel.style.transition = 'transform .2s';
                this.s.panel.style.transform = 'translateX(0)';
                setTimeout(() => {
                    this.s.panel.style.transition = '';
                    this.s.panel.style.transform = '';
                }, 200);
            }
            this.s.panel = null;
            this.s.offsetX = 0;
            this.s.moved = false;
        },

        _deleteAfterSwipe() {
            if (!this.s.panel) return;
            const id = +this.s.panel.dataset.id;
            EH.del(id);
            this.s.panel = null;
        },
    };

    const Drag = {
        FLIP_MS: 180,
        s: {
            on: false, flipping: false,
            catBody: null, catId: null,
            src: null, clone: null,
            ox: 0, oy: 0, lastNext: null,
        },
        _mv: null, _up: null, _cx: null,

        init() {
            document.addEventListener('touchstart', e => this._ts(e), { passive: true });
        },

        _ts(e) {
            if (e.touches.length > 1) return;
            const h = e.target.closest('.drag-handle');
            if (!h) return;
            const panel = h.closest('.panel');
            const body  = h.closest('.cat-body');
            if (!panel || !body || panel.classList.contains('panel-dummy')) return;
            if (UI.editId) return;
            this._start(panel, body, e.touches[0]);
        },

        _start(panel, body, t) {
            const r = panel.getBoundingClientRect();
            this.s.on = true;
            this.s.src = panel;
            this.s.catBody = body;
            this.s.catId   = body.dataset.cat;

            const clone = panel.cloneNode(true);
            clone.style.cssText = `position:fixed;left:${r.left}px;top:${r.top}px;
                width:${r.width}px;height:${r.height}px;pointer-events:none;z-index:9999;
                opacity:.93;transform:scale(1.03);box-shadow:0 8px 24px rgba(0,0,0,.25);`;
            document.body.appendChild(clone);
            panel.classList.add('drag-source');
            this.s.clone    = clone;
            this.s.ox       = t.clientX - r.left;
            this.s.oy       = t.clientY - r.top;
            this.s.lastNext = panel.nextSibling;

            this._mv = e => { e.preventDefault(); this._move(e.touches[0]); };
            this._up = () => this._end();
            this._cx = () => this._cancel();
            document.addEventListener('touchmove',   this._mv, { passive: false });
            document.addEventListener('touchend',    this._up);
            document.addEventListener('touchcancel', this._cx);
            if (navigator.vibrate) navigator.vibrate(25);
        },

        _move(t) {
            const { clone, src, ox, oy } = this.s;
            if (!clone) return;
            clone.style.left = `${t.clientX - ox}px`;
            clone.style.top  = `${t.clientY - oy}px`;
            if (this.s.flipping) return;

            const ty = t.clientY;

            // Find which category the clone is over
            const bodies = [...document.querySelectorAll('.cat-body')];
            let targetBody = this.s.catBody;
            for (const b of bodies) {
                const r = b.getBoundingClientRect();
                if (ty >= r.top && ty <= r.bottom) {
                    targetBody = b;
                    break;
                }
            }

            // Switch category if needed
            const newCatId = targetBody.dataset.cat;
            if (newCatId !== this.s.catId) {
                this.s.catId = newCatId;
                this.s.catBody = targetBody;
                this.s.lastNext = null;
            }

            const panels = [...targetBody.querySelectorAll('.panel:not(.drag-source):not(.panel-dummy)')];
            let best = null, bestD = Infinity;
            panels.forEach(p => {
                const r = p.getBoundingClientRect();
                const d = Math.abs(ty - (r.top + r.height / 2));
                if (d < bestD) { bestD = d; best = p; }
            });
            if (!best) return;

            const bc  = best.getBoundingClientRect();
            const bcy = bc.top + bc.height / 2;
            const dummy = targetBody.querySelector('.panel-dummy');
            let next = ty < bcy ? best : best.nextSibling;
            if (next === null) next = dummy;

            if (next === this.s.lastNext) return;

            const all = [...targetBody.querySelectorAll('.panel:not(.panel-dummy)')];
            all.forEach(p => p.getAnimations().forEach(a => a.finish()));

            const pre = {};
            all.forEach(p => { pre[p.dataset.id] = p.getBoundingClientRect(); });

            targetBody.insertBefore(src, next);
            this.s.lastNext = next;
            this.s.flipping = true;
            setTimeout(() => { this.s.flipping = false; }, this.FLIP_MS + 30);

            all.filter(p => !p.classList.contains('drag-source')).forEach(p => {
                const n = p.getBoundingClientRect();
                const o = pre[p.dataset.id];
                if (!o) return;
                const dy = o.top - n.top;
                if (Math.abs(dy) < 1) return;
                p.animate([{ transform: `translateY(${dy}px)` }, { transform: 'none' }],
                    { duration: this.FLIP_MS, easing: 'cubic-bezier(.25,.46,.45,.94)' });
            });
        },

        _end() {
            this._off();
            const { catBody, catId, src, clone } = this.s;
            const srcId = +src.dataset.id;
            const srcItem = AppState.items.find(i => i.id === srcId);
            const oldCat = srcItem.categoryId;

            const panels  = [...catBody.querySelectorAll('.panel:not(.panel-dummy)')];
            const newOrder = panels.map(p => +p.dataset.id);

            clone.remove();
            src.classList.remove('drag-source');

            // Update categoryId if moved to different category
            srcItem.categoryId = catId;

            // Reorder in the (possibly new) category
            AppState.reorderInCat(catId, newOrder);
            UI.render();
            this._reset();
        },

        _cancel() {
            this._off();
            if (this.s.clone) this.s.clone.remove();
            if (this.s.src)   this.s.src.classList.remove('drag-source');
            this._reset();
        },

        _off() {
            document.removeEventListener('touchmove',   this._mv);
            document.removeEventListener('touchend',    this._up);
            document.removeEventListener('touchcancel', this._cx);
            this._mv = this._up = this._cx = null;
        },

        _reset() {
            Object.assign(this.s, {
                on: false, flipping: false, catBody: null, catId: null,
                src: null, clone: null, lastNext: null,
            });
        },
    };

    const Storage = {
        save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} },
        load(k)    { try { const d = localStorage.getItem(k); return d ? JSON.parse(d) : null; } catch(e){ return null; } },
    };

    function escH(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function esc(t)  { return String(t).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

    const CATS = [
        { id: 'c1', name: '常備品', collapsed: false },
        { id: 'c2', name: '食材',   collapsed: false },
    ];
    const ITEMS = [
        { id: 1, name: '塩',     categoryId: 'c1', needed: false },
        { id: 2, name: '砂糖',   categoryId: 'c1', needed: false },
        { id: 3, name: '醤油',   categoryId: 'c1', needed: false },
        { id: 4, name: 'みりん', categoryId: 'c1', needed: false },
        { id: 5, name: '油',     categoryId: 'c1', needed: false },
        { id: 6, name: '卵',     categoryId: 'c2', needed: false },
        { id: 7, name: '牛乳',   categoryId: 'c2', needed: false },
    ];

    AppState.init(CATS, ITEMS);
    UI.render();
    Swipe.init();
    Drag.init();
    </script>
